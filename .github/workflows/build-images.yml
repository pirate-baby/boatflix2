name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'fastapi-manager/**'
      - 'qbittorrentvpn/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: pirate-baby

jobs:
  build-manager:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./fastapi-manager
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/boatflix-manager:latest
            ghcr.io/${{ env.OWNER }}/boatflix-manager:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-qbittorrentvpn:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./qbittorrentvpn
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/boatflix-qbittorrentvpn:latest
            ghcr.io/${{ env.OWNER }}/boatflix-qbittorrentvpn:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
